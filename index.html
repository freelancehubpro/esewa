<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI Overlay</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-dark: #0d1216;
    --accent-green: #22c55e;
    --text-gray: #9ca3af;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Montserrat', sans-serif;
}

/* FULL SCREEN BACKGROUND IMAGE */
body {
    background: url("image.jpg") no-repeat center center/cover;
    min-height: 100vh;
}

/* OVERLAY UI */
.interactive-overlay {
    position: absolute;
    top: 35px; /* adjust if needed */
    left: 16px;
    right: 16px;
    height: 72px;
    background-color: var(--bg-dark);
    border-radius: 18px;
    display: flex;
    align-items: center;
    padding: 0 16px;
}

/* SECTIONS */
.section {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
}

.section-right {
    justify-content: flex-end;
    text-align: right;
}

/* TEXT */
.value {
    font-size: 18px;
    font-weight: 700;
    color: white;
}

.label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-gray);
}

/* CENTER TOGGLE */
.toggle-zone {
    width: 60px;
    display: flex;
    justify-content: center;
    position: relative;
}

.divider {
    position: absolute;
    width: 1px;
    height: 40px;
    background: #262c33;
}

.eye-btn {
    width: 36px;
    height: 36px;
    background: #1f252b;
    border-radius: 50%;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

/* ICONS */
.icon {
    width: 22px;
    height: 22px;
    stroke: white;
    fill: none;
    stroke-width: 2;
}

.icon-green {
    stroke: var(--accent-green);
    width: 14px;
    margin-left: 4px;
}

/* RU BADGE */
.ru-badge {
    position: absolute;
    bottom: -2px;
    right: -2px;
    background: var(--accent-green);
    color: black;
    font-size: 8px;
    font-weight: 800;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* WALLET DETAIL */
.wallet-marker {
    width: 7px;
    height: 3px;
    background: var(--accent-green);
    position: absolute;
    bottom: 6px;
    left: 5px;
}

/* STAR */
.star-inner {
    fill: #ef4444;
    stroke: none;
}

</style>
</head>

<body>

<!-- OVERLAY UI -->
<div class="interactive-overlay">

    <!-- LEFT -->
    <div class="section">
        <div style="position: relative;">
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M20 12V8H6a2 2 0 0 1-2-2 2 2 0 0 1 2-2h14v4"/>
                <path d="M4 6v12a2 2 0 0 0 2 2h14v-4"/>
                <path d="M18 12a2 2 0 0 0-2 2 2 2 0 0 0 2 2h4v-4Z"/>
            </svg>
            <div class="wallet-marker"></div>
        </div>

        <div>
            <div class="value">
                <span id="curr">NPR</span> 
                <span id="bal">XXXX.XX</span>
            </div>
            <div class="label">Balance</div>
        </div>
    </div>

    <!-- CENTER TOGGLE -->
    <div class="toggle-zone">
        <div class="divider"></div>

        <button class="eye-btn" id="eyeToggle">
            <svg id="eyeOff" class="icon" style="stroke:#7f8c8d;" viewBox="0 0 24 24">
                <line x1="2" y1="2" x2="22" y2="22"/>
                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7"/>
            </svg>

            <svg id="eyeOn" class="icon" style="display:none; stroke:#7f8c8d;" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="3"/>
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            </svg>

            <div class="ru-badge">??</div>
        </button>
    </div>

    <!-- RIGHT -->
    <div class="section section-right">
        <div>
            <div class="value">
                <span id="pts">XXXX.XX</span>
                <svg class="icon-green" viewBox="0 0 24 24" stroke-width="3">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </div>
            <div class="label">Fonepoints</div>
        </div>

        <div>
            <svg class="icon" viewBox="0 0 24 24">
                <circle cx="12" cy="8" r="7"/>
                <polygon class="star-inner" points="12 4.5 13.5 7.5 16.5 8 14 10.5 14.5 13.5 12 12 9.5 13.5 10 10.5 7.5 8 10.5 7.5"/>
            </svg>
        </div>
    </div>

</div>

<script>
let visible = false;

document.getElementById("eyeToggle").onclick = () => {
    visible = !visible;

    document.getElementById("bal").innerText = visible ? "30.24" : "XXXX.XX";
    document.getElementById("pts").innerText = visible ? "24.77" : "XXXX.XX";
    document.getElementById("curr").innerText = visible ? "NRS" : "NPR";

    document.getElementById("eyeOff").style.display = visible ? "none" : "block";
    document.getElementById("eyeOn").style.display = visible ? "block" : "none";
};
</script>

</body>
</html>
