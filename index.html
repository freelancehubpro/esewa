<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI Overlay</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-dark: #0d1216;
    --accent-green: #22c55e;
    --text-gray: #9ca3af;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Montserrat', sans-serif;
}

/* KEEP YOUR ORIGINAL BACKGROUND */
body {
    background: url("image.jpg") no-repeat center center/cover;
    min-height: 100vh;
}

/* ================= OVERLAY UI ================= */
.interactive-overlay {
    position: absolute;
    top: 82px;
    left: 9px;
    right: 9px;
    height: 70px;
    background-color: var(--bg-dark);
    border-radius: 16px;
    display: flex;
    align-items: center;
    padding: 0 16px;
}

.section {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
}

.section-right {
    justify-content: flex-end;
    text-align: right;
}

.value {
    font-size: 18px;
    font-weight: 700;
    color: white;
}

.label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-gray);
}

.toggle-zone {
    width: 60px;
    display: flex;
    justify-content: center;
    position: relative;
}

.divider {
    position: absolute;
    width: 1px;
    height: 40px;
    background: #262c33;
}

.eye-btn {
    width: 36px;
    height: 36px;
    background: #1f252b;
    border-radius: 50%;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.icon {
    width: 22px;
    height: 22px;
    stroke: white;
    fill: none;
    stroke-width: 2;
}

.icon-green {
    stroke: var(--accent-green);
    width: 14px;
    margin-left: 4px;
}

.ru-badge {
    position: absolute;
    bottom: -2px;
    right: -2px;
    background: var(--accent-green);
    color: black;
    font-size: 8px;
    font-weight: 800;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.wallet-marker {
    width: 9px;
    height: 5px;
    background: var(--accent-green);
    position: absolute;
    bottom: 6px;
    left: 5px;
}

.star-inner {
    fill: #ef4444;
    stroke: none;
}

/* ================= QR BUTTON (UNCHANGED VALUES) ================= */

/* IMPORTANT: removed body override only */
.circle {
    position: absolute;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    width: 230px;
    height: 230px;
    background: #6bd15c;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: transform 0.1s ease;
}

.circle:active {
    transform: translateX(-50%) scale(0.96);
}

.qr {
    position: relative;
    width: 110px;
    height: 110px;
}

.box {
    width: 42px;
    height: 42px;
    border: 7px solid white;
    border-radius: 10px;
    position: absolute;
    box-sizing: border-box;
}

.box::after {
    content: "";
    width: 14px;
    height: 14px;
    background: white;
    border-radius: 4px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.top-left { top: 5px; left: 5px; }
.top-right { top: 5px; right: 5px; }
.bottom-left { bottom: 5px; left: 5px; }

.dots {
    position: absolute;
    bottom: 8px;
    right: 8px;
    display: grid;
    grid-template-columns: repeat(3, 9px);
    grid-gap: 5px;
}

.dot {
    width: 9px;
    height: 9px;
    background: white;
    border-radius: 50%;
}

.message {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.message.show {
    opacity: 1;
}
</style>
</head>

<body>

<!-- ORIGINAL UI -->
<div class="interactive-overlay">
    <!-- (unchanged content) -->
</div>

<!-- QR BUTTON -->
<div class="circle" id="qrButton">
  <div class="qr">
    <div class="box top-left"></div>
    <div class="box top-right"></div>
    <div class="box bottom-left"></div>
    <div class="dots" id="dots"></div>
  </div>
</div>

<div class="message" id="message">Please try again later.</div>

<script>
// ORIGINAL SCRIPT
let visible = false;

document.getElementById("eyeToggle").onclick = () => {
    visible = !visible;

    document.getElementById("bal").innerText = visible ? "19.24" : "XXXX.XX";
    document.getElementById("pts").innerText = visible ? "24.77" : "XXXX.XX";
    document.getElementById("curr").innerText = "NRS";

    document.getElementById("eyeOff").style.display = visible ? "none" : "block";
    document.getElementById("eyeOn").style.display = visible ? "block" : "none";
};

// QR DOTS
const dotsContainer = document.getElementById("dots");
const pattern = [1,1,0,0,1,1,0,0,1];

pattern.forEach(val => {
    const dot = document.createElement("div");
    dot.classList.add("dot");
    if (!val) dot.style.opacity = "0";
    dotsContainer.appendChild(dot);
});

// BUTTON CLICK
const btn = document.getElementById("qrButton");
const msg = document.getElementById("message");

btn.addEventListener("click", () => {
    msg.classList.add("show");
    setTimeout(() => msg.classList.remove("show"), 2000);
});
</script>

</body>
    </html>
